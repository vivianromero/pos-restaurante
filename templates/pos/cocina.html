{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cocina - POS Restaurante</title>
    <link rel="stylesheet" href="{% static 'pos/css/common.css' %}">
    <link rel="stylesheet" href="{% static 'pos/css/cocina.css' %}">
</head>
<body>
    <div class="cocina-container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <h1>👨‍🍳 Pantalla de Cocina</h1>
                <div class="header-buttons">
                    <button class="btn-refresh" onclick="cargarPedidos()">♻️ Actualizar</button>
                    <button class="btn-password" onclick="window.location.href='/cambiar-password/'" title="Cambiar Contraseña">🔐</button>
                    <button class="btn-logout" onclick="cerrarSesion()">🚪 Salir</button>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <span class="stat-label">⏳ Pendientes:</span>
                    <span class="stat-value" id="pendientesCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">‍🔥 En preparación:</span>
                    <span class="stat-value" id="procesandoCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🍽️ Servidas:</span>
                    <span class="stat-value" id="servidasCount">0</span>
                </div>
                <div class="stat fecha-stat">
                    <div class="fecha-control">
                        <label>📅 Fecha de operación:</label>
                        <span class="stat-value" id="fechaOperacion">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid de pedidos -->
        <div class="pedidos-grid" id="pedidosGrid">
            <div class="loading-container">
                <div class="spinner"></div>
                <p>Cargando pedidos...</p>
            </div>
        </div>
    </div>

    <!-- Modal para confirmar -->
    <div id="servirModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>🍽️ Marcar como servido</h3>
            <p id="modalMessage">¿Confirmar que este pedido está listo para servir?</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-confirm" id="confirmarServirBtn">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="{% static 'pos/js/config.js' %}"></script>
    <script src="{% static 'pos/js/utils.js' %}"></script>
    <script src="{% static 'pos/js/common.js' %}"></script>
    <script src="{% static 'pos/js/cocina.js' %}"></script>
</body>
</html>
